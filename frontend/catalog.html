<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizeth The Barberette | Catálogo</title>
    <link rel="icon" href="/assets/img/barber-pole.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
    <script src="/assets/js/currency.js"></script>
    <style>
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 4rem; position: relative; z-index: 10; }
        
        .header-nav { display: flex; gap: 2rem; align-items: center; }
        .header-nav a {
            color: #ffffff; text-decoration: none; font-family: 'Century Gothic', 'Tw Cen MT', sans-serif;
            font-weight: bold; font-size: 1.1rem; text-transform: uppercase; transition: color 0.3s;
        }
        .header-nav a:hover, .header-nav a.active { color: var(--primary); }

        .cart-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .cart-link:hover {
            background: rgba(255,255,255,0.1);
        }

        @media (max-width: 900px) {
            .top-bar { flex-direction: column; gap: 1.5rem; padding: 1.5rem; }
            .header-nav { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body class="dashboard-body">

    <header class="top-bar">
        <a href="/" class="logo" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
            <img src="/assets/img/barber-pole.png" alt="Poste de Barbero" style="height: 70px; filter: drop-shadow(0 0 15px rgba(154, 34, 171, 0.5));">
            <img src="/assets/img/logo.png" alt="Lizeth The Barberette" style="height: 60px; object-fit: contain;">
        </a>
        <div class="header-nav">
            <a href="/">HOME</a>
            <a href="/catalog.html" class="active">SHOP</a>
            <a href="/cart.html" class="cart-link">🛒 CART (<span id="cart-count">0</span>)</a>
            <a href="/login.html" class="btn-primary" style="padding: 10px 24px; border-radius: 50px; width: auto;">SIGN IN</a>
            <button id="lang-toggle" onclick="toggleLanguage()" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:5px 15px; border-radius:15px; cursor:pointer; margin-left: 10px; font-weight: bold; transition: background 0.3s;">ES</button>
        </div>
    </header>

    <main class="dashboard-content">
        <header class="section-header">
            <h2>Course Catalog</h2>
            <p>Selecciona los videos que deseas adquirir.</p>
        </header>

        <div class="grid" id="catalog-grid">
            <!-- Dinámico -->
            Cargando catálogo...
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const updateCartCount = () => {
                const cart = JSON.parse(localStorage.getItem('videoCart')) || [];
                document.getElementById('cart-count').textContent = cart.length;
            };
            updateCartCount();

            window.addToCart = (id, title, price) => {
                const cart = JSON.parse(localStorage.getItem('videoCart')) || [];
                if(!cart.find(v => v.id === id)) {
                    cart.push({ id, title, price });
                    localStorage.setItem('videoCart', JSON.stringify(cart));
                    updateCartCount();
                    alert(`"${title}" agregado al carrito`);
                } else {
                    alert('El video ya está en el carrito');
                }
            };

            let allVideos = [];
            const covers = [
                'photo-1585747860715-2ba37e788b70',
                'photo-1503951914875-452162b0f3f1',
                'photo-1622286342621-4bd786c2447c',
                'photo-1534723452862-4c874018d66d',
                'photo-1599351431202-1e0f0137899a',
                'photo-1605497788044-5a32c7078486',
                'photo-1526374965328-7f61d4dc18c5',
                'photo-1593720213428-28a5b9e94613'
            ];

            async function loadCatalog() {
                try {
                    const res = await fetch('/api/videos/catalog');
                    allVideos = await res.json();
                    renderCatalog();
                } catch(e) {
                    console.error(e);
                    document.getElementById('catalog-grid').innerHTML = '<p>Error al cargar catálogo</p>';
                }
            }

            function renderCatalog() {
                const grid = document.getElementById('catalog-grid');
                if(!allVideos || allVideos.length === 0) {
                    grid.innerHTML = '<p>No hay videos disponibles</p>';
                    return;
                }

                grid.innerHTML = allVideos.map((v, i) => {
                    const coverId = covers[i % covers.length];
                    return `
                    <div class="card interactive">
                        <div class="card-img-wrapper" style="cursor: pointer;" onclick="window.location.href='/product.html?id=${v.id}'">
                            <div class="overlay-play">Ver Detalles</div>
                            <img src="https://images.unsplash.com/${coverId}?auto=format&fit=crop&w=600&q=80" alt="${v.title}">
                        </div>
                        <div class="card-content" style="padding: 1rem 0;">
                            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1rem; cursor: pointer;" onclick="window.location.href='/product.html?id=${v.id}'">
                                <h3 style="margin: 0; color: var(--primary); font-size: 1.1rem; text-transform: uppercase;">${v.title}</h3>
                                <span class="price-tag" style="color: var(--sec-1); font-size: 1.1rem;">${window.formatPrice ? window.formatPrice(v.price) : '$' + v.price}</span>
                            </div>
                            <button onclick="addToCart('${v.id}', '${v.title}', ${v.price})" class="btn-primary">ADD TO CART</button>
                        </div>
                    </div>
                    `;
                }).join('');
            }

            if (window.onCurrencyChange) {
                window.onCurrencyChange(() => {
                    if (allVideos.length > 0) renderCatalog();
                });
            }

            loadCatalog();
        });
    </script>
    <script src="/assets/js/i18n.js"></script>
</body>
</html>
