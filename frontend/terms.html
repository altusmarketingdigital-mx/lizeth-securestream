<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizeth The Barberette | Terms and Conditions</title>
    <link rel="icon" href="/assets/img/barber-pole.png" type="image/png">
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        .legal-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 3rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .legal-container h1 { color: var(--primary); margin-bottom: 2rem; font-size: 2.5rem; }
        .legal-container h2 { color: #fff; margin-top: 2rem; margin-bottom: 1rem; font-size: 1.5rem; }
        .legal-container p, .legal-container li { color: #ccc; line-height: 1.6; margin-bottom: 1rem; }
        .legal-container ul { margin-left: 20px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="bg-animated-mesh"></div>
    
    <header class="top-bar">
        <a href="/" class="logo" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
            <img src="/assets/img/barber-pole.png" alt="Poste de Barbero" style="height: 70px;">
            <img id="dyn-logo_img" src="/assets/img/logo.png" alt="Lizeth The Barberette" style="height: 60px; object-fit: contain;">
        </a>
        <div class="header-nav">
            <a href="/">HOME</a>
            <a href="/catalog.html">SHOP</a>
            <a href="/login.html" class="btn-primary" style="padding: 10px 24px; border-radius: 50px; width: auto;">SIGN IN</a>
            <button id="lang-toggle" onclick="toggleLanguage()" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:5px 15px; border-radius:15px; cursor:pointer; margin-left: 10px; font-weight: bold; transition: background 0.3s;">ES</button>
        </div>
    </header>

    <main class="legal-container" id="dynamic-legal-content" data-page-type="terms">
        <p style="text-align:center; color:#aaa;">Loading content...</p>
    </main>
    
    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <img src="/assets/img/logo.png" alt="Logo" class="footer-logo">
                <p id="dyn-footer_text">Monetizing knowledge with extreme security.<br>No guard, no hair left... BALD!!!</p>
            </div>
            <div class="footer-links-col">
                <h4>Explore</h4>
                <a href="/">Home</a>
                <a href="/catalog.html">Shop</a>
                <a href="/login.html">Sign In</a>
            </div>
            <div class="footer-links-col">
                <h4>Legal</h4>
                <a href="/terms.html">Terms and Conditions</a>
                <a href="/privacy.html">Privacy Policy</a>
                <a href="/refunds.html">Refund Policy</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Lizeth The Barberette. All rights reserved.</p>
        </div>
    </footer>
    <script src="/assets/js/settings.js"></script>
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/load_legal_page.js"></script>
</body>
</html>
