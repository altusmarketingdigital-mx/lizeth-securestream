<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | SecureStream</title>
    <link rel="icon" href="/assets/img/barber-pole.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 4rem; position: relative; z-index: 10; }
        .header-nav { display: flex; gap: 2rem; align-items: center; }
        .header-nav a {
            color: #ffffff; text-decoration: none; font-family: 'Century Gothic', 'Tw Cen MT', sans-serif;
            font-weight: bold; font-size: 1.1rem; text-transform: uppercase; transition: color 0.3s;
        }
        .header-nav a:hover, .header-nav a.active { color: var(--primary); }
        .cart-link { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .cart-link:hover { background: rgba(255,255,255,0.1); }

        .cart-content {
            flex: 1;
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 2rem;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }
        
        .cart-layout {
            background: rgba(15, 15, 15, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 40px rgba(154, 34, 171, 0.2);
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        
        .cart-layout h2 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 1rem;
            font-family: 'Century Gothic', sans-serif;
            text-transform: uppercase;
            text-align: center;
        }

        .cart-list { display:flex; flex-direction:column; gap:15px; }
        .cart-item { 
            display:flex; justify-content:space-between; align-items: center; 
            padding: 20px; background: rgba(255,255,255,0.03); border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .cart-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(154, 34, 171, 0.3);
            transform: translateX(5px);
        }
        .cart-item span {
            font-family: 'Century Gothic', sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
            color: #ffffff;
        }
        .cart-item strong {
            font-family: 'Century Gothic', sans-serif;
            font-size: 1.2rem;
            color: var(--primary);
        }
        
        .cart-total-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .cart-total { 
            font-size: 1.8rem; 
            font-weight: bold; 
            font-family: 'Century Gothic', sans-serif;
            color: #ffffff;
        }

        .cart-total span {
            color: var(--primary);
        }

        .btn-checkout {
            background: var(--primary);
            color: #ffffff;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-family: 'Century Gothic', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px -5px rgba(154, 34, 171, 0.4);
            align-self: flex-end;
        }
        
        .btn-checkout:hover {
            background: #b02bc3;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -5px rgba(154, 34, 171, 0.6);
        }

        .btn-checkout:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        @media (max-width: 900px) {
            .cart-layout { padding: 2rem; }
            .top-bar { flex-direction: column; gap: 1.5rem; padding: 1.5rem; }
            .header-nav { flex-wrap: wrap; justify-content: center; }
            .cart-total-box { flex-direction: column; gap: 1.5rem; align-items: center; }
            .btn-checkout { align-self: center; width: 100%; }
        }
    </style>
</head>
<body style="background: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; min-height: 100vh;">
    <div class="bg-animated-mesh"></div>

    <header class="top-bar">
        <div class="logo" style="display: flex; align-items: center; gap: 15px;">
            <img src="/assets/img/barber-pole.png" alt="Poste de Barbero" style="height: 70px; filter: drop-shadow(0 0 15px rgba(154, 34, 171, 0.5));">
            <img src="/assets/img/logo.png" alt="Lizeth The Barberette" style="height: 60px; object-fit: contain;">
        </div>
        <div class="header-nav">
            <a href="/">HOME</a>
            <a href="/catalog.html">SHOP</a>
            <a href="/cart.html" class="cart-link active">🛒 CART (<span id="cart-count">0</span>)</a>
            <a href="/login.html" class="btn-primary" style="padding: 10px 24px; border-radius: 50px; width: auto;">SIGN IN</a>
        </div>
    </header>

    <main class="cart-content">
        <div class="cart-layout">
            <h2>Tu Carrito</h2>
            <div id="cart-container" class="cart-list"></div>
            
            <div id="coupon-section" style="display:flex; gap: 10px; margin-top: 1rem;">
                <input type="text" id="coupon-code" placeholder="Código de descuento" style="flex:1; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; font-family: Bahnschrift;">
                <button id="apply-coupon-btn" class="btn-checkout" style="padding: 12px 24px;">Aplicar</button>
            </div>
            <p id="coupon-msg" style="margin-top: 5px; font-family: Bahnschrift;"></p>

            <div class="cart-total-box">
                <div class="cart-total">Total: <span>$<span id="total-price">0</span> USD</span></div>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: flex-end;">
                    <button id="stripe-btn" class="btn-checkout" style="background: #635bff;">
                        <svg style="vertical-align: middle; margin-right: 5px;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
                        Pagar con Tarjeta
                    </button>
                    <button id="paypal-btn" class="btn-checkout" style="background: #ffc439; color: #003087; box-shadow: 0 10px 25px -5px rgba(255, 196, 57, 0.4);">
                        <svg style="vertical-align: middle; margin-right: 5px;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11V7a5 5 0 0 1 10 0v4"></path><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect></svg>
                        Pagar con PayPal
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <img src="/assets/img/logo.png" alt="Lizeth The Barberette" class="footer-logo">
                <p>Monetizing knowledge with extreme security.<br>No guard, no hair left... BALD!!!</p>
            </div>
            <div class="footer-links-col">
                <h4>Explore</h4>
                <a href="/">Home</a>
                <a href="/catalog.html">Shop</a>
                <a href="/login.html">Sign In</a>
            </div>
            <div class="footer-links-col">
                <h4>Legal</h4>
                <a href="#">About</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Contact</a>
            </div>
            <div class="footer-social">
                <h4>Find me on</h4>
                <div class="social-icons">
                    <a href="#" title="Instagram"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg></a>
                    <a href="#" title="YouTube"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Lizeth The Barberette. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cart = JSON.parse(localStorage.getItem('videoCart')) || [];
            const container = document.getElementById('cart-container');
            const totalEl = document.getElementById('total-price');
            const cc = document.getElementById('cart-count');
            
            if(cc) cc.textContent = cart.length;
            
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; font-family: Bahnschrift, sans-serif; color: #888;">Tu carrito está vacío.</p>';
                document.getElementById('stripe-btn').disabled = true;
                document.getElementById('paypal-btn').disabled = true;
                return;
            }

            let originalTotal = 0;
            let currentTotal = 0;
            let appliedCoupon = null;

            container.innerHTML = cart.map(v => {
                originalTotal += parseFloat(v.price) || 0;
                return `
                <div class="cart-item">
                    <span>${v.title}</span>
                    <strong>$${v.price}</strong>
                </div>`;
            }).join('');
            
            currentTotal = originalTotal;
            totalEl.textContent = currentTotal.toFixed(2);

            document.getElementById('apply-coupon-btn').addEventListener('click', async () => {
                const code = document.getElementById('coupon-code').value;
                const msg = document.getElementById('coupon-msg');
                if(!code) return;
                
                try {
                    const res = await fetch('/api/coupons/validate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code })
                    });
                    const data = await res.json();
                    
                    if(res.ok) {
                        appliedCoupon = data.code;
                        currentTotal = originalTotal * (1 - (data.discount_percentage / 100));
                        totalEl.textContent = currentTotal.toFixed(2);
                        msg.style.color = '#4ade80';
                        msg.textContent = `Cupón aplicado: -${data.discount_percentage}% de descuento`;
                    } else {
                        msg.style.color = 'var(--error)';
                        msg.textContent = data.error || 'Cupón inválido';
                        appliedCoupon = null;
                        currentTotal = originalTotal;
                        totalEl.textContent = currentTotal.toFixed(2);
                    }
                } catch(e) {
                    msg.style.color = 'var(--error)';
                    msg.textContent = 'Error al validar cupón';
                }
            });

            const handleCheckout = async (type, btnId) => {
                const btn = document.getElementById(btnId);
                const originalText = btn.innerHTML;
                btn.textContent = 'Procesando...';
                btn.disabled = true;

                if(!localStorage.getItem('userEmail')) {
                    alert('Debes iniciar sesión para comprar.');
                    window.location.href = '/login.html';
                    return;
                }

                try {
                    const videoIds = cart.map(v => v.id);
                    let endpoint = type === 'stripe' ? '/api/payment/create-checkout-session' : '/api/payment/create-paypal-order';
                    
                    const res = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ videoIds, couponCode: appliedCoupon })
                    });
                    
                    const data = await res.json();
                    
                    if(res.ok) {
                        if (type === 'stripe' && data.url) {
                            localStorage.removeItem('videoCart');
                            window.location.href = data.url;
                        } else if (type === 'paypal' && data.orderID) {
                            // Simular la aprobación en popup de PayPal y posterior captura
                            alert('Simulando popup nativo de PayPal para la orden: ' + data.orderID);
                            
                            const captureRes = await fetch('/api/payment/capture-paypal-order', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ orderID: data.orderID, videoIds })
                            });
                            
                            const captureData = await captureRes.json();
                            if(captureRes.ok && captureData.success) {
                                localStorage.removeItem('videoCart');
                                window.location.href = captureData.url;
                            } else {
                                throw new Error('Error en la captura de PayPal');
                            }
                        }
                    } else {
                        throw new Error(data.error || 'Error al procesar el pago');
                    }
                } catch(e) {
                    alert(e.message || 'Error de conexión');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            };

            document.getElementById('stripe-btn').addEventListener('click', () => handleCheckout('stripe', 'stripe-btn'));
            document.getElementById('paypal-btn').addEventListener('click', () => handleCheckout('paypal', 'paypal-btn'));
        });
    </script>
</body>
</html>
