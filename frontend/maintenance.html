<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizeth The Barberette | Maintenance</title>
    <link rel="icon" href="/assets/img/barber-pole.png" type="image/png">
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #000;
            color: #fff;
            text-align: center;
            font-family: sans-serif;
        }
        .maintenance-container {
            max-width: 600px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .maintenance-container img {
            width: 150px;
            margin-bottom: 20px;
        }
        .maintenance-container h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary);
        }
        .maintenance-container p {
            font-size: 1.1rem;
            color: #ccc;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .btn-primary {
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <img src="/assets/img/logo.png" alt="Logo">
        <h1>¡Volveremos Pronto!</h1>
        <p>El sitio se encuentra actualmente en mantenimiento programado. Estamos realizando mejoras para ofrecerte una mejor experiencia.</p>
        <p>Gracias por tu paciencia.</p>
        <a href="/login.html" class="btn-primary" style="margin-top: 10px;">Acceso Administrador</a>
    </div>
</body>
</html>
