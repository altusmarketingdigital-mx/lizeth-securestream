<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizeth The Barberette | Soporte y Contacto</title>
    <link rel="icon" href="/assets/img/barber-pole.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 4rem; position: relative; z-index: 10; }
        .header-nav { display: flex; gap: 2rem; align-items: center; }
        .header-nav a {
            color: #ffffff; text-decoration: none; font-family: 'Century Gothic', 'Tw Cen MT', sans-serif;
            font-weight: bold; font-size: 1.1rem; text-transform: uppercase; transition: color 0.3s;
        }
        .header-nav a:hover, .header-nav a.active { color: var(--primary); }

        .login-main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem 2rem;
            position: relative;
            z-index: 2;
        }

        .auth-glass-panel {
            background: rgba(15, 15, 15, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 40px rgba(154, 34, 171, 0.2);
            text-align: center;
        }

        .auth-glass-panel h2 {
            font-family: 'Century Gothic', sans-serif;
            color: #ffffff;
            font-size: 2rem;
            margin: 0;
            text-transform: uppercase;
        }

        .auth-glass-panel p.desc {
            color: var(--sec-1);
            font-family: 'Bahnschrift', sans-serif;
            margin: 0;
            font-size: 1rem;
            line-height: 1.5;
        }

        .auth-input, select, textarea {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            font-family: 'Bahnschrift', sans-serif;
            font-size: 1rem;
            border-radius: 12px;
            box-sizing: border-box;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
        }
        
        textarea { resize: vertical; min-height: 120px; }
        select option { background: #111; color: #fff; }

        .auth-input::placeholder, textarea::placeholder { color: #888888; }
        .auth-input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px rgba(154, 34, 171, 0.3); background: rgba(0,0,0,0.8); }

        .auth-btn {
            background: var(--primary);
            color: #ffffff;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-family: 'Century Gothic', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px -5px rgba(154, 34, 171, 0.4);
            width: 100%;
        }

        .auth-btn:hover { background: #b02bc3; transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(154, 34, 171, 0.6); }

        @media (max-width: 800px) {
            .auth-glass-panel { padding: 2rem; }
            .top-bar { flex-direction: column; gap: 1.5rem; padding: 1.5rem; }
            .header-nav { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body style="background: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; min-height: 100vh;">
    <div class="bg-animated-mesh"></div>

    <header class="top-bar">
        <div class="logo" style="display: flex; align-items: center; gap: 15px; cursor: pointer;" onclick="window.location.href='/'">
            <img src="/assets/img/barber-pole.png" alt="Poste de Barbero" style="height: 70px; filter: drop-shadow(0 0 15px rgba(154, 34, 171, 0.5));">
            <img src="/assets/img/logo.png" alt="Lizeth The Barberette" style="height: 60px; object-fit: contain;">
        </div>
        <div class="header-nav">
            <a href="/">HOME</a>
            <a href="/catalog.html">SHOP</a>
            <a href="/login.html" class="btn-primary" style="padding: 10px 24px; border-radius: 50px; width: auto;" id="auth-link">SIGN IN</a>
            <button id="lang-toggle" onclick="toggleLanguage()" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:5px 15px; border-radius:15px; cursor:pointer; margin-left: 10px; font-weight: bold; transition: background 0.3s;">ES</button>
        </div>
    </header>

    <main class="login-main">
        <div class="auth-glass-panel">
            <h2>Soporte y Contacto</h2>
            <p class="desc">¿Tienes problemas con un pago o acceso a tu cuenta? Llena el siguiente formulario y me comunicaré contigo lo más pronto posible.</p>
            
            <form id="contact-form" style="text-align: left; margin-top: 1rem;">
                <input type="text" id="c-name" class="auth-input" placeholder="Tu Nombre Completo" required>
                <input type="email" id="c-email" class="auth-input" placeholder="Tu Email Address" required>
                
                <select id="c-reason" required>
                    <option value="" disabled selected>Motivo del contacto</option>
                    <option value="Problema con un pago">Problema con un pago / Recibo no llega</option>
                    <option value="Problema de acceso">No puedo acceder a mi cuenta o video</option>
                    <option value="Duda sobre contenido">Duda sobre un curso o masterclass</option>
                    <option value="Negocios / Colaboración">Propuesta de negocios o colaboración</option>
                    <option value="Otro">Otro asunto</option>
                </select>
                
                <textarea id="c-message" placeholder="Describe tu problema con todo el detalle posible..." required></textarea>
                
                <button type="submit" id="submit-btn" class="auth-btn">ENVIAR MENSAJE</button>
                <p id="msg-box" style="display:none; font-weight: bold; margin-top: 1rem; text-align: center;"></p>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-bottom" style="text-align: center; padding: 2rem; color: #666; font-size: 0.9rem;">
            <p>&copy; 2026 Lizeth The Barberette. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('userEmail')) {
                const authLink = document.getElementById('auth-link');
                authLink.textContent = 'MI CUENTA';
                authLink.href = '/dashboard.html';
                document.getElementById('c-email').value = localStorage.getItem('userEmail');
            }
        });

        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('c-name').value;
            const email = document.getElementById('c-email').value;
            const reason = document.getElementById('c-reason').value;
            const message = document.getElementById('c-message').value;
            
            const msgBox = document.getElementById('msg-box');
            const btn = document.getElementById('submit-btn');

            btn.textContent = 'ENVIANDO...';
            btn.disabled = true;
            msgBox.style.display = 'none';

            try {
                const res = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, reason, message })
                });

                const data = await res.json();
                
                msgBox.textContent = data.message || data.error;
                msgBox.style.color = res.ok ? 'var(--sec-3)' : 'var(--error)';
                msgBox.style.display = 'block';

                if(res.ok) {
                    document.getElementById('contact-form').reset();
                    if(localStorage.getItem('userEmail')) {
                        document.getElementById('c-email').value = localStorage.getItem('userEmail');
                    }
                }
            } catch (err) {
                msgBox.textContent = 'Error de conexión con el servidor.';
                msgBox.style.color = 'var(--error)';
                msgBox.style.display = 'block';
            } finally {
                btn.textContent = 'ENVIAR MENSAJE';
                btn.disabled = false;
            }
        });
    </script>
    <script src="/assets/js/i18n.js"></script>
</body>
</html>
