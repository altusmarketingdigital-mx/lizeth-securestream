<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizeth The Barberette | Nueva Password</title>
    <link rel="icon" href="/assets/img/barber-pole.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 4rem; position: relative; z-index: 10; }
        .header-nav { display: flex; gap: 2rem; align-items: center; }
        .header-nav a {
            color: #ffffff; text-decoration: none; font-family: 'Century Gothic', 'Tw Cen MT', sans-serif;
            font-weight: bold; font-size: 1.1rem; text-transform: uppercase; transition: color 0.3s;
        }
        .header-nav a:hover, .header-nav a.active { color: var(--primary); }

        .login-main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem 2rem;
            position: relative;
            z-index: 2;
        }

        .auth-glass-panel {
            background: rgba(15, 15, 15, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 40px rgba(154, 34, 171, 0.2);
            text-align: center;
        }

        .auth-glass-panel h2 {
            font-family: 'Century Gothic', sans-serif;
            color: #ffffff;
            font-size: 2rem;
            margin: 0;
            text-transform: uppercase;
        }

        .auth-glass-panel p.desc {
            color: var(--sec-1);
            font-family: 'Bahnschrift', sans-serif;
            margin: 0;
            font-size: 1rem;
            line-height: 1.5;
        }

        .auth-input {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            font-family: 'Bahnschrift', sans-serif;
            font-size: 1rem;
            border-radius: 12px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .auth-input::placeholder { color: #888888; }
        .auth-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px rgba(154, 34, 171, 0.3); background: rgba(0,0,0,0.8); }

        .auth-btn {
            background: var(--primary);
            color: #ffffff;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-family: 'Century Gothic', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px -5px rgba(154, 34, 171, 0.4);
            width: 100%;
        }

        .auth-btn:hover { background: #b02bc3; transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(154, 34, 171, 0.6); }

        @media (max-width: 800px) {
            .auth-glass-panel { padding: 2rem; }
            .top-bar { flex-direction: column; gap: 1.5rem; padding: 1.5rem; }
            .header-nav { flex-wrap: wrap; justify-content: center; }
        }
    </style>
<script src="/assets/js/auth-check.js"></script>
</head>
<body style="background: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; min-height: 100vh;">
    <div class="bg-animated-mesh"></div>

    <header class="top-bar">
        <div class="logo" style="display: flex; align-items: center; gap: 15px; cursor: pointer;" onclick="window.location.href='/'">
            <img src="/assets/img/barber-pole.png" alt="Poste de Barbero" style="height: 70px; filter: drop-shadow(0 0 15px rgba(154, 34, 171, 0.5));">
            <img src="/assets/img/logo.png" alt="Lizeth The Barberette" style="height: 60px; object-fit: contain;">
        </div>
        <div class="header-nav">
            <a href="/">HOME</a>
            <a href="/catalog.html">SHOP</a>
            <a href="/login.html" class="active btn-primary" style="padding: 10px 24px; border-radius: 50px; width: auto;">SIGN IN</a>
            <button id="lang-toggle" onclick="toggleLanguage()" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:5px 15px; border-radius:15px; cursor:pointer; margin-left: 10px; font-weight: bold; transition: background 0.3s;">ES</button>
        </div>
    </header>

    <main class="login-main">
        <div class="auth-glass-panel">
            <h2>Crear Nueva Password</h2>
            <p class="desc">Ingresa tu nueva contraseña para recuperar el acceso a tu cuenta.</p>
            
            <div style="width: 100%; display: flex; flex-direction: column; gap: 1.5rem;">
                <input type="password" id="new-password" class="auth-input" placeholder="Nueva contraseña (mínimo 6 caracteres)">
                <button id="submit-btn" class="auth-btn">GUARDAR CONTRASEÑA</button>
            </div>
            
            <p id="msg-box" style="display:none; font-weight: bold; margin-top: 1rem;"></p>
            
            <div style="margin-top: 10px;">
                <a href="/login.html" style="color: #aaa; font-size: 0.95rem; text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='#aaa'">⬅ Volver al inicio de sesión</a>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-bottom" style="text-align: center; padding: 2rem; color: #666; font-size: 0.9rem;">
            <p>&copy; 2026 Lizeth The Barberette. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Extraer token de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.querySelector('.auth-glass-panel h2').textContent = 'Enlace Inválido';
            document.querySelector('.auth-glass-panel p.desc').textContent = 'El enlace de recuperación es inválido o ha expirado. Por favor, solicita uno nuevo.';
            document.getElementById('new-password').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'none';
        }

        document.getElementById('submit-btn').addEventListener('click', async () => {
            const newPassword = document.getElementById('new-password').value;
            const msgBox = document.getElementById('msg-box');
            const btn = document.getElementById('submit-btn');
            
            if(!newPassword || newPassword.length < 6) {
                msgBox.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                msgBox.style.color = 'var(--error)';
                msgBox.style.display = 'block';
                return;
            }

            btn.textContent = 'Guardando...';
            btn.disabled = true;
            msgBox.style.display = 'none';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await res.json();
                
                msgBox.textContent = data.message || data.error;
                msgBox.style.color = res.ok ? 'var(--sec-3)' : 'var(--error)';
                msgBox.style.display = 'block';

                if(res.ok) {
                    document.getElementById('new-password').value = '';
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 3000);
                }
            } catch (err) {
                msgBox.textContent = 'Error de conexión con el servidor.';
                msgBox.style.color = 'var(--error)';
                msgBox.style.display = 'block';
            } finally {
                btn.textContent = 'GUARDAR CONTRASEÑA';
                btn.disabled = false;
            }
        });
    </script>
    <script src="/assets/js/i18n.js"></script>
</body>
</html>
