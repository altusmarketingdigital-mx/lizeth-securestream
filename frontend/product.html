<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizeth The Barberette | Producto</title>
    <link rel="icon" href="/assets/img/barber-pole.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
    <script src="/assets/js/currency.js"></script>
    <style>
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 4rem; position: relative; z-index: 10; }
        .header-nav { display: flex; gap: 2rem; align-items: center; }
        .header-nav a {
            color: #ffffff; text-decoration: none; font-family: 'Century Gothic', 'Tw Cen MT', sans-serif;
            font-weight: bold; font-size: 1.1rem; text-transform: uppercase; transition: color 0.3s;
        }
        .header-nav a:hover, .header-nav a.active { color: var(--primary); }
        .cart-link { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .cart-link:hover { background: rgba(255,255,255,0.1); }

        .product-content {
            flex: 1;
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 2rem;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }
        
        .product-layout {
            display: flex;
            gap: 4rem;
            background: rgba(15, 15, 15, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 40px rgba(154, 34, 171, 0.2);
        }
        
        .product-gallery {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .main-image {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .thumbnails {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .thumbnails img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            cursor: pointer;
            border-radius: 8px;
            transition: opacity 0.2s, border-color 0.2s;
            border: 1px solid transparent;
        }
        
        .thumbnails img:hover {
            opacity: 0.8;
            border-color: var(--primary);
        }
        
        .product-details {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .product-details h2 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
            line-height: 1.2;
            font-family: 'Century Gothic', sans-serif;
            text-transform: uppercase;
        }
        
        .product-price {
            font-size: 2rem;
            color: var(--primary);
            font-family: 'Century Gothic', sans-serif;
            font-weight: bold;
            margin-bottom: 2rem;
        }
        
        .product-description {
            font-family: 'Bahnschrift', sans-serif;
            font-size: 1.1rem;
            color: var(--sec-1);
            line-height: 1.6;
            margin-bottom: 3rem;
            flex: 1;
        }
        
        .btn-add {
            background: var(--primary);
            color: #ffffff;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-family: 'Century Gothic', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.1rem;
            cursor: pointer;
            align-self: flex-start;
            transition: all 0.3s;
            box-shadow: 0 10px 25px -5px rgba(154, 34, 171, 0.4);
            width: 100%;
        }
        
        .btn-add:hover {
            background: #b02bc3;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -5px rgba(154, 34, 171, 0.6);
        }
        
        @media (max-width: 900px) {
            .product-layout { flex-direction: column; padding: 2rem; gap: 2rem; }
            .top-bar { flex-direction: column; gap: 1.5rem; padding: 1.5rem; }
            .header-nav { flex-wrap: wrap; justify-content: center; }
        }
    </style>
<script src="/assets/js/auth-check.js"></script>
</head>
<body style="background: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; min-height: 100vh;">
    <div class="bg-animated-mesh"></div>

    <header class="top-bar">
        <a href="/" class="logo" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
            <img src="/assets/img/barber-pole.png" alt="Poste de Barbero" style="height: 70px; filter: drop-shadow(0 0 15px rgba(154, 34, 171, 0.5));">
            <img src="/assets/img/logo.png" alt="Lizeth The Barberette" style="height: 60px; object-fit: contain;">
        </a>
        <div class="header-nav">
            <a href="/">HOME</a>
            <a href="/catalog.html">SHOP</a>
            <a href="/cart.html" class="cart-link">🛒 CART (<span id="cart-count">0</span>)</a>
            <a href="/login.html" class="btn-primary" style="padding: 10px 24px; border-radius: 50px; width: auto;">SIGN IN</a>
            <button id="lang-toggle" onclick="toggleLanguage()" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:5px 15px; border-radius:15px; cursor:pointer; margin-left: 10px; font-weight: bold; transition: background 0.3s;">ES</button>
        </div>
    </header>

    <main class="product-content">
        <div class="product-layout" id="product-container">
            <p style="width:100%; text-align:center;">Cargando información del producto...</p>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <img src="/assets/img/logo.png" alt="Lizeth The Barberette" class="footer-logo">
                <p>Monetizing knowledge with extreme security.<br>No guard, no hair left... BALD!!!</p>
            </div>
            <div class="footer-links-col">
                <h4>Explore</h4>
                <a href="/">Home</a>
                <a href="/catalog.html">Shop</a>
                <a href="/login.html">Sign In</a>
            </div>
            <div class="footer-links-col">
                <h4>Legal</h4>
                <a href="/terms.html">Terms and Conditions</a>
                <a href="/privacy.html">Privacy Policy</a>
                <a href="/refunds.html">Refund Policy</a>
            </div>
            <div class="footer-social">
                <h4>Find me on</h4>
                <div class="social-icons">
                    <a href="https://www.instagram.com/lzthebarberette" target="_blank" title="Instagram"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg></a>
                    <a href="https://www.tiktok.com/@lizethbarberette" target="_blank" title="TikTok"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg></a>
                    <a href="https://youtube.com/@lizeththebarberette" target="_blank" title="YouTube"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Lizeth The Barberette. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const updateCartCount = () => {
                const cart = JSON.parse(localStorage.getItem('videoCart')) || [];
                const cc = document.getElementById('cart-count');
                if(cc) cc.textContent = cart.length;
            };
            updateCartCount();

            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const container = document.getElementById('product-container');
            let currentProduct = null;
            let videosList = [];

            if (!productId) {
                container.innerHTML = '<p style="text-align:center;width:100%;">Producto no encontrado.</p>';
                return;
            }

            async function loadProduct() {
                try {
                    // Fetch all videos and find the matching one
                    const res = await fetch('/api/videos/catalog');
                    videosList = await res.json();
                    currentProduct = videosList.find(v => v.id === productId);

                    if (!currentProduct) {
                        container.innerHTML = '<p style="text-align:center;width:100%;">Producto no encontrado en el catálogo.</p>';
                        return;
                    }
                    renderProduct();
                } catch (err) {
                    console.error(err);
                    container.innerHTML = '<p style="text-align:center;width:100%;">Error al cargar el producto.</p>';
                }
            }

            async function renderProduct() {
                if(!currentProduct) return;
                const product = currentProduct;

                const covers = [
                    'photo-1585747860715-2ba37e788b70',
                    'photo-1503951914875-452162b0f3f1',
                    'photo-1622286342621-4bd786c2447c',
                    'photo-1534723452862-4c874018d66d',
                    'photo-1599351431202-1e0f0137899a',
                    'photo-1605497788044-5a32c7078486',
                    'photo-1526374965328-7f61d4dc18c5',
                    'photo-1593720213428-28a5b9e94613'
                ];
                
                const productIndex = videosList.findIndex(v => v.id === productId);
                const coverId = covers[Math.max(0, productIndex) % covers.length];

                // Obtener imágenes del backend
                const imgRes = await fetch(`/api/videos/${product.id}/images`);
                const realImages = await imgRes.json();
                
                let mainImageSrc = `https://images.unsplash.com/${coverId}?auto=format&fit=crop&w=800&q=80`;
                let thumbnailsHTML = '';

                if (realImages && realImages.length > 0) {
                    mainImageSrc = realImages[0].image_data;
                    
                    thumbnailsHTML = realImages.map((img, idx) => `
                        <img src="${img.image_data}" alt="Imagen ${idx + 1}" onclick="document.getElementById('product-main-img').src = this.src">
                    `).join('');
                } else {
                    // Fallback Unsplash
                    thumbnailsHTML = `
                        <img src="https://images.unsplash.com/${coverId}?auto=format&fit=crop&w=300&q=80" alt="Thumb 1" onclick="document.getElementById('product-main-img').src = this.src">
                        <img src="https://images.unsplash.com/photo-1595476108010-b4d1f10a5171?auto=format&fit=crop&w=300&q=80" alt="Thumb 2" onclick="document.getElementById('product-main-img').src = this.src">
                        <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=300&q=80" alt="Thumb 3" onclick="document.getElementById('product-main-img').src = this.src">
                    `;
                }

                // Generar párrafos para simular descripción larga
                const descriptionParagraphs = product.description.split('\\n').map(p => p.trim()).filter(p => p.length > 0);
                let descHTML = '';
                if(descriptionParagraphs.length > 0) {
                    descHTML = descriptionParagraphs.map(p => `<p>${p}</p>`).join('');
                } else {
                    descHTML = `<p>${product.description}</p>`;
                }

                container.innerHTML = `
                    <div class="product-gallery">
                        <img id="product-main-img" class="main-image" src="${mainImageSrc}" alt="${product.title}">
                        <div class="thumbnails">
                            ${thumbnailsHTML}
                        </div>
                    </div>
                    <div class="product-details">
                        <h2>${product.title}</h2>
                        
                        <div class="price-container" style="margin-bottom: 2rem;">
                            ${product.sale_price 
                                ? `<span style="text-decoration: line-through; opacity: 0.6; font-size: 1.2rem; margin-right: 10px;">${window.formatPrice ? window.formatPrice(product.price, product.currency) : '$' + product.price}</span>
                                   <span class="product-price" style="color: var(--sec-1); font-weight: bold;">${window.formatPrice ? window.formatPrice(product.sale_price, product.currency) : '$' + product.sale_price}</span>` 
                                : `<span class="product-price">${window.formatPrice ? window.formatPrice(product.price, product.currency) : '$' + product.price}</span>`
                            }
                        </div>

                        <div class="product-description">
                            ${descHTML}
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 2rem;">
                            <button onclick="addToCart('${product.id}', '${product.title.replace(/'/g, "\\'")}', ${product.sale_price || product.price}, '${product.currency || 'MXN'}'); window.location.href='/cart.html'" class="btn-primary" style="width: 100%; font-size: 1.2rem; padding: 15px;">COMPRAR AHORA</button>
                            <button onclick="addToCart('${product.id}', '${product.title.replace(/'/g, "\\'")}', ${product.sale_price || product.price}, '${product.currency || 'MXN'}')" class="btn-primary" style="width: 100%; font-size: 1.1rem; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white;">AÑADIR AL CARRITO</button>
                        </div>
                    </div>
                `;
            }

            if (window.onCurrencyChange) {
                window.onCurrencyChange(() => {
                    renderProduct();
                });
            }

            loadProduct();
        });

        // Add to cart global function
        window.addToCart = (id, title, price, currency = 'MXN') => {
            const cart = JSON.parse(localStorage.getItem('videoCart')) || [];
            if(!cart.find(v => v.id === id)) {
                cart.push({ id, title, price, currency });
                localStorage.setItem('videoCart', JSON.stringify(cart));
                alert(`"${title}" agregado al carrito`);
                
                const cc = document.getElementById('cart-count');
                if(cc) cc.textContent = cart.length;
            } else {
                alert('El video ya está en el carrito');
            }
        };
    </script>
    <script src="/assets/js/i18n.js"></script>
</body>
</html>
